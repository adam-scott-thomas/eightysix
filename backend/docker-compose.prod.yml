services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: restaurant_chops
      POSTGRES_USER: chops
      POSTGRES_PASSWORD: chops_rc_prod_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chops -d restaurant_chops"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chops:chops_rc_prod_2026@db:5432/restaurant_chops
      POS_PROVIDER: stub
      LABOR_PROVIDER: stub
      APP_ENV: production
      CORS_ORIGINS: '["https://rc.adamscottthomas.com","http://rc.adamscottthomas.com"]'
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
