services:
  db:
    image: postgres:16-alpine
    env_file: .env.prod
    environment:
      POSTGRES_DB: eightysix
      POSTGRES_USER: chops
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chops -d eightysix"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      POS_PROVIDER: stub
      LABOR_PROVIDER: stub
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped

  demo:
    build: ../eightysix-demo
    ports:
      - "8001:8001"
    env_file: .env.demo
    volumes:
      - demo-leads:/app/leads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - demo
    restart: unless-stopped

volumes:
  pgdata:
  demo-leads:
