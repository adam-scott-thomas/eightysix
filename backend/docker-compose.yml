services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eightysix
      POSTGRES_USER: chops
      POSTGRES_PASSWORD: chops_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chops -d eightysix"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://chops:chops_dev_password@db:5432/eightysix
      POS_PROVIDER: stub
      LABOR_PROVIDER: stub
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata:
