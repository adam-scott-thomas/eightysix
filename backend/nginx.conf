server {
    listen 80;
    server_name rc.adamscottthomas.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rc.adamscottthomas.com;

    ssl_certificate /etc/letsencrypt/live/rc.adamscottthomas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rc.adamscottthomas.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint
    location /health {
        proxy_pass http://app:8000;
    }

    # OpenAPI docs
    location /docs {
        proxy_pass http://app:8000;
    }
    location /openapi.json {
        proxy_pass http://app:8000;
    }
    location /redoc {
        proxy_pass http://app:8000;
    }

    # SSE stream
    location /api/v1/locations/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
